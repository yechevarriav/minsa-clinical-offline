name: Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Download MINSA Data
        run: |
          # Los datos se asumen que están en el repo
          # Si no, descárgalos aquí
          ls -la data/

      - name: Run Unit Tests
        run: |
          pytest tests/unit/ -v -s --cov=src/offline_clinic --cov-report=xml

      - name: Run Integration Tests (sin API)
        run: |
          pytest tests/integration/ -v -s

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        if: always()

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: |
          pip install pylint flake8 black isort

      - name: Run Black (formatter check)
        run: black --check src/offline_clinic tests
        continue-on-error: true

      - name: Run isort (imports check)
        run: isort --check-only src/offline_clinic tests
        continue-on-error: true

      - name: Run Flake8
        run: flake8 src/offline_clinic tests --max-line-length=120
        continue-on-error: true

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install security tools
        run: |
          pip install bandit pip-audit

      - name: Run Bandit (security check)
        run: bandit -r src/offline_clinic -f json -o bandit-report.json
        continue-on-error: true

      - name: Run pip-audit
        run: pip-audit --skip-editable
        continue-on-error: true
