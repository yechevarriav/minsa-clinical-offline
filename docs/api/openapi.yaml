openapi: 3.0.2
info:
  title: MINSA - Sistema de Soporte Clínico Offline
  description: |
    API REST para consultas diagnósticas offline basadas en RAG con LLM local (Llama-2).

    **Características:**
    - ✅ Búsqueda semántica de códigos CIE-10 (14,702 opciones)
    - ✅ Contexto demográfico: edad y sexo del paciente
    - ✅ Funciona 100% offline (sin internet requerido)
    - ✅ Feedback loop para aprendizaje continuo
    - ✅ Latencia típica: ~290ms

    **Stack:**
    - Backend: FastAPI 0.104.1
    - LLM: Llama-2 7B 4-bit (Ollama)
    - Vector Store: FAISS IVF+PQ (14,702 embeddings)
    - Feedback: SQLite

    **Documentación:**
    - Repositorio: https://github.com/yechevarriav/minsa-clinical-offline
    - URL Producción: https://minsa-clinical-offline.onrender.com

  version: "1.0.0"
  contact:
    name: Yvonne Patricia Echevarría Vargas
    email: yechevarriav@gmail.com
    url: https://github.com/yechevarriav
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://minsa-clinical-offline.onrender.com
    description: Producción (Cloud - Render.com)
  - url: http://localhost:8000
    description: Desarrollo local
  - url: http://0.0.0.0:8000
    description: Docker local

tags:
  - name: Query
    description: Consultas diagnósticas (búsqueda de códigos CIE-10)
  - name: Feedback
    description: Registro de feedback del médico para aprendizaje
  - name: Health
    description: Verificación de salud y disponibilidad

paths:
  /api/v1/query:
    post:
      tags:
        - Query
      summary: Búsqueda diagnóstica con contexto demográfico
      description: |
        Retorna códigos CIE-10 relevantes basados en síntomas descritos en lenguaje natural.

        **Pipeline:**
        1. Enriquecimiento de query (NER - Named Entity Recognition)
        2. Transformación semántica (sentence-transformers)
        3. Búsqueda híbrida (FAISS + léxica + feedback)
        4. Ranking contextual (edad, sexo, frecuencia histórica)
        5. Enriquecimiento con LLM (Llama-2 explicación)

        **Latencia típica:** 290ms
      operationId: query_diagnostic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiagnosticQueryRequest'
            examples:
              ejemplo_fiebre:
                summary: "Fiebre en lactante"
                value:
                  question: "fiebre alta, paciente 2 años, femenino, sin apetito"
                  age: 2
                  gender: "F"
                  top_k: 5
              ejemplo_dolor:
                summary: "Dolor abdominal"
                value:
                  question: "dolor abdominal intermitente, paciente 45 años, antecedente GERD"
                  age: 45
                  gender: "M"
                  top_k: 3
              ejemplo_migraña:
                summary: "Migraña con aura"
                value:
                  question: "dolor de cabeza pulsátil severo, visión borrosa, paciente 32 años"
                  age: 32
                  gender: "F"
                  top_k: 5
      responses:
        '200':
          description: Consulta exitosa — códigos CIE-10 encontrados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiagnosticQueryResponse'
              examples:
                exitosa:
                  summary: "Respuesta exitosa"
                  value:
                    query: "fiebre alta"
                    age: 2
                    gender: "F"
                    results:
                      - code: "R50.9"
                        description: "FIEBRE NO ESPECIFICADA"
                        relevance: 0.92
                        explanation: "En menores de 10 años, la fiebre puede indicar..."
                        recommendations:
                          - "Anamnesis completa"
                          - "Derivar a pediatría si > 39°C"
                      - code: "B99.9"
                        description: "INFECCIÓN NO ESPECIFICADA"
                        relevance: 0.78
                    search_time_ms: 245.32
                    models_ready: true
                    version: "1.0.0"
        '400':
          description: Solicitud inválida (parámetros faltantes o inválidos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: "Campo 'question' es requerido"
                status: 400
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                detail: "Error al buscar en FAISS: modelo no cargado"
                status: 500

  /api/v1/feedback:
    post:
      tags:
        - Feedback
      summary: Registrar feedback del diagnóstico
      description: |
        Registra la selección del médico para aprendizaje continuo del sistema.

        **Función:**
        - Almacena qué código CIE-10 fue seleccionado
        - Contexto: edad, sexo, timestamp
        - Sistema genera sinónimos aprendidos
        - Próximas búsquedas similares boostean este código

        **Impacto:**
        - Mejora de relevancia con el tiempo
        - Adaptación a patrones locales de la clínica
      operationId: register_feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackRequest'
            example:
              query_id: "uuid-12345"
              selected_code: "R50.9"
              age: 2
              gender: "F"
      responses:
        '201':
          description: Feedback registrado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackResponse'
              example:
                status: "success"
                message: "Feedback registrado para R50.9"
                feedback_id: "uuid-67890"
                timestamp: "2026-04-26T14:30:00Z"
        '400':
          description: Feedback inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error al guardar feedback
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags:
        - Health
      summary: Verificar estado del sistema
      description: |
        Endpoint para health checks y verificación de disponibilidad de modelos.

        **Retorna:**
        - `models_ready: true` → Todos los modelos cargados (FastAPI, FAISS, LLM)
        - `models_ready: false` → Algún modelo aún se está cargando

        **Latencia:** < 10ms
      operationId: health_check
      responses:
        '200':
          description: Sistema disponible y listo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                models_ready: true
                timestamp: "2026-04-26T14:30:00Z"
                version: "1.0.0"
        '503':
          description: Modelos aún se están cargando (wait 30-60s)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                models_ready: false
                status: "loading_models"
                message: "Ollama iniciando Llama-2..."
                timestamp: "2026-04-26T14:25:00Z"

components:
  schemas:
    DiagnosticQueryRequest:
      type: object
      required:
        - question
        - age
        - gender
      properties:
        question:
          type: string
          minLength: 5
          maxLength: 500
          description: |
            Descripción de síntomas en lenguaje natural.
            Ejemplos:
            - "fiebre alta, tos productiva"
            - "dolor abdominal intermitente"
            - "erupción pruriginosa en brazos"
          example: "fiebre alta, paciente 2 años, sin apetito"
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: "Edad del paciente en años"
          example: 2
        gender:
          type: string
          enum:
            - "M"
            - "F"
            - "O"
          description: |
            Género del paciente.
            - M: Masculino
            - F: Femenino
            - O: Otro
          example: "F"
        top_k:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
          description: "Número de resultados a retornar (top-k)"
          example: 5

    DiagnosticQueryResponse:
      type: object
      properties:
        query:
          type: string
          description: "Query original del usuario"
          example: "fiebre alta"
        age:
          type: integer
          description: "Edad del paciente"
          example: 2
        gender:
          type: string
          description: "Género del paciente"
          example: "F"
        results:
          type: array
          description: "Array de códigos CIE-10 relevantes, ordenados por relevancia (descendente)"
          items:
            $ref: '#/components/schemas/DiagnosticResult'
        search_time_ms:
          type: number
          format: float
          description: "Tiempo de ejecución en milisegundos"
          example: 245.32
        models_ready:
          type: boolean
          description: "Indicador de disponibilidad de modelos"
          example: true
        version:
          type: string
          description: "Versión de la API"
          example: "1.0.0"

    DiagnosticResult:
      type: object
      properties:
        code:
          type: string
          pattern: "^[A-Z][0-9]{2}(\\.[0-9]{1,2})?$"
          description: "Código CIE-10 (ej: R50.9, G43.1)"
          example: "R50.9"
        description:
          type: string
          description: "Descripción del código en español (MINSA oficial)"
          example: "FIEBRE NO ESPECIFICADA"
        relevance:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: |
            Score de relevancia (0.0 a 1.0).
            - 0.9+ : Muy relevante
            - 0.7-0.9 : Relevante
            - 0.5-0.7 : Moderadamente relevante
            - <0.5 : Baja relevancia
          example: 0.92
        explanation:
          type: string
          nullable: true
          description: |
            Explicación generada por LLM (Llama-2) sobre por qué es relevante.
            Puede ser null si LLM está deshabilitado.
          example: "En menores de 10 años, la fiebre puede indicar una infección viral o bacteriana..."
        recommendations:
          type: array
          items:
            type: string
          nullable: true
          description: "Recomendaciones clínicas adicionales (generadas por LLM)"
          example:
            - "Anamnesis completa (duración, patrón)"
            - "Derivar a pediatría si > 39°C o signos de alarma"

    FeedbackRequest:
      type: object
      required:
        - selected_code
        - age
        - gender
      properties:
        query_id:
          type: string
          format: uuid
          nullable: true
          description: "ID de la query (opcional, para trazabilidad)"
          example: "uuid-12345"
        selected_code:
          type: string
          pattern: "^[A-Z][0-9]{2}(\\.[0-9]{1,2})?$"
          description: "Código CIE-10 seleccionado por el médico"
          example: "R50.9"
        age:
          type: integer
          minimum: 0
          maximum: 150
          description: "Edad del paciente"
          example: 2
        gender:
          type: string
          enum:
            - "M"
            - "F"
            - "O"
          description: "Género del paciente"
          example: "F"
        notes:
          type: string
          nullable: true
          maxLength: 500
          description: "Notas adicionales del médico (opcional)"
          example: "Paciente con antecedente de otitis recurrente"

    FeedbackResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - "success"
            - "error"
          description: "Estado de la operación"
          example: "success"
        message:
          type: string
          description: "Mensaje descriptivo"
          example: "Feedback registrado para R50.9"
        feedback_id:
          type: string
          format: uuid
          nullable: true
          description: "ID único del feedback registrado"
          example: "uuid-67890"
        timestamp:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp UTC del registro"
          example: "2026-04-26T14:30:00Z"

    HealthResponse:
      type: object
      properties:
        models_ready:
          type: boolean
          description: "Indicador de disponibilidad de todos los modelos"
          example: true
        status:
          type: string
          nullable: true
          enum:
            - "healthy"
            - "loading_models"
            - "error"
          description: "Estado detallado del sistema"
          example: "healthy"
        message:
          type: string
          nullable: true
          description: "Mensaje adicional (ej: 'Ollama iniciando Llama-2...')"
          example: null
        timestamp:
          type: string
          format: date-time
          description: "Timestamp UTC"
          example: "2026-04-26T14:30:00Z"
        version:
          type: string
          description: "Versión de la API"
          example: "1.0.0"

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: "Descripción del error"
          example: "Campo 'question' es requerido"
        status:
          type: integer
          description: "Código HTTP de error"
          example: 400

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Autenticación opcional via API Key (futuro).
        Actualmente sin restricciones (público).

---

# Ejemplos de uso

## cURL

### Búsqueda diagnóstica
```bash
curl -X POST https://minsa-clinical-offline.onrender.com/api/v1/query \
  -H "Content-Type: application/json" \
  -d '{
    "question": "fiebre alta, tos productiva",
    "age": 45,
    "gender": "M",
    "top_k": 5
  }'
```

### Registrar feedback
```bash
curl -X POST https://minsa-clinical-offline.onrender.com/api/v1/feedback \
  -H "Content-Type: application/json" \
  -d '{
    "query_id": "uuid-12345",
    "selected_code": "J18.9",
    "age": 45,
    "gender": "M"
  }'
```

### Health check
```bash
curl https://minsa-clinical-offline.onrender.com/health
```

## Python (requests)

```python
import requests
import json

BASE_URL = "https://minsa-clinical-offline.onrender.com"

# Query
response = requests.post(
    f"{BASE_URL}/api/v1/query",
    json={
        "question": "fiebre alta, tos productiva",
        "age": 45,
        "gender": "M"
    }
)
print(json.dumps(response.json(), indent=2))

# Feedback
requests.post(
    f"{BASE_URL}/api/v1/feedback",
    json={
        "selected_code": "J18.9",
        "age": 45,
        "gender": "M"
    }
)

# Health
health = requests.get(f"{BASE_URL}/health")
print(health.json())
```

## JavaScript (fetch)

```javascript
const BASE_URL = "https://minsa-clinical-offline.onrender.com";

// Query
fetch(`${BASE_URL}/api/v1/query`, {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    question: "fiebre alta, tos productiva",
    age: 45,
    gender: "M"
  })
})
  .then(r => r.json())
  .then(data => console.log(data));

// Health
fetch(`${BASE_URL}/health`)
  .then(r => r.json())
  .then(data => console.log(data.models_ready ? "✅ Ready" : "⏳ Loading"));
```

---

## Notas técnicas

- **Rate Limiting:** No implementado (futuro)
- **Autenticación:** Actualmente sin JWT (futuro para RENHICE)
- **CORS:** Habilitado para dominios MINSA
- **Timeout:** 30s por query (LLM inference)
- **Compresión:** gzip automático en respuestas >1KB
